<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>聖嬰現象探索：台灣海域海溫分析</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #ffffff; display: flex; justify-content: center; padding: 20px; }
        .main-container { display: flex;flex-direction: row; align-items: flex-start;  gap: 40px; width: 1200px; max-width: 95vw;}
        .dashboard { width: 800px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        /* 分頁切換按鈕 */
        .page-tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { padding: 10px 25px; cursor: pointer; border: none; background: #f0f0f0; margin: 0 5px; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--accent-color); color: white; }

        /* 圖片容器與箭頭 */
        .carousel-container { position: relative; display: flex; align-items: center; justify-content: center; margin: 20px 0; background: #f9f9f9; border-radius: 10px; }
        #chart { width: 80%; height: 500px; }
        .arrow { cursor: pointer; position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.2); color: white; border: none; padding: 15px; border-radius: 50%; font-size: 20px;width: 55px;height: 55px; transition: 0.3s; z-index: 10; }
        .arrow:hover { background: var(--primary-color); }
        .prev { left: 10px; }
        .next { right: 10px; }
        
        /* 下方分頁點 */
        .dots { margin-top: 10px; }
        .dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin: 0 5px; cursor: pointer; }
        .dot.active { background-color: var(--primary-color); }

        .dashboarder { width: 300px; background: white; padding: 30px;padding-top:60px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        /* 月份標籤與文字描述 */
        .info-section { margin-top: 20px; text-align: left; padding: 20px; border-top: 2px solid #eee; }
        .month-tag { display: inline-block; background: var(--primary-color); color: white; padding: 5px 15px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; }
        #feature-text { font-size: 1.1rem; line-height: 1.6; color: #555; height: 100px; }
        @media screen and (max-width: 600px) {
            h1 { font-size: 20px; }
            #chart { height: 450px; }
        }
    </style>
</head>
<body>
<dive class="main-container">
<div class="dashboard">
    <div class="page-tabs">
        <button class="tab-btn active" onclick="switchYear('2021', this)">2021年 (反聖嬰)</button>
        <button class="tab-btn" onclick="switchYear('2023', this)">2023年 (聖嬰)</button>
    </div>

    <h1> 聖嬰/反聖嬰事件：台灣周邊海溫異常分佈</h1>
    
    <div class="carousel-container">
        <button class="arrow prev" onclick="changeMonth(-1)">&#10094;</button>
        <div id="chart"></div>
        <button class="arrow next" onclick="changeMonth(1)">&#10095;</button>
    </div>

    <div class="dots" id="dot-container"></div>
</div>
<div class="dashboarder">
    <div class="info-section">
        <div class="month-tag" id="month-label">載入中...</div>
        <h3>各月份特徵分析：</h3>
        <p id="feature-text">正在載入數據...</p>
    </div>
</div>
</dive>
<script>
    let allData = [];
    let currentIdx = 0;
    let months = [];
    let currentYear = '2021'; // 預設年份

    const featureDescriptions = {
        // 2021 反聖嬰特徵描述
        "2021-01": "反聖嬰現象強盛，雖然有冬季冷高壓，但台灣東側海域仍可見明顯正距平。",
        "2021-02": "暖水持續在台灣南部與東部海域盤據，顯示西太平洋熱含量豐富。",
        "2021-03": "春季開始，台灣海峽暖化跡象明顯，溫度異常範圍擴大。",
        "2021-04": "正距平訊號（紅色）轉趨強烈，顯示反聖嬰背景下的海洋蓄熱效應。",
        "2021-05": "梅雨季前夕，周邊海域溫度普遍偏高，可能增加水氣輸送。",
        "2021-06": "進入夏季，全海域呈現大面積紅色，距平值達 +1.0°C 以上。",
        "2021-07": "高溫範圍穩定，黑潮路徑上的異常暖水非常顯著。",
        "2021-08": "海溫異常達到夏季高峰，台灣周邊幾乎被暖水包圍。",
        "2021-09": "秋季開始，但反聖嬰導致的暖化訊號未見消退。",
        "2021-10": "雖然大氣轉涼，但海洋對溫度的反應較慢，維持暖色調。",
        "2021-11": "台灣海域依然偏暖，與典型冷冬的大氣感官形成對比。",
        "2021-12": "年底維持溫和正距平，顯示該年海洋熱量輸出極為穩定。",
    

        // 2023 聖嬰特徵描述
        "2023-01": "延續前兩年反聖嬰餘波，台灣附近仍有微弱正距平，但範圍開始縮小。",
        "2023-02": "海溫距平開始轉趨中性，紅色區塊逐漸被白色（正常）取代。",
        "2023-03": "聖嬰訊號開始醞釀，台灣周邊出現局部負距平（藍色），顯示熱量外移。",
        "2023-04": " 海溫波動劇烈，海峽訊號偏弱，整體處於氣候轉折期。",
        "2023-05": "聖嬰現象正式成形，台灣附近熱量堆積速度減緩，顏色偏淡。",
        "2023-06": "進入夏季，受全球海洋熱浪影響，距平值再度轉正。",  
        "2023-07": "聖嬰事件確立，台灣南部海域熱量累積速度加快，呈現粉紅色。",
        "2023-08": "高溫訊號明顯，聖嬰年的「暖池偏移」效應在此時與夏季高溫疊加。",
        "2023-09": "異常升溫持續，黑潮主流區顏色加深，距平值接近 +1.5°C。",
        "2023-10": "聖嬰強盛期，台灣海溫未如往年秋季迅速轉冷，維持顯著暖意。",
        "2023-11": "聖嬰達到巔峰，台灣周邊海域呈現強烈紅橘色，異常升溫極為明顯。",
        "2023-12": "年底受聖嬰現象與全球暖化雙重影響，出現明顯「暖冬」海洋訊號。"
    };

    // 切換年份的函式
    async function switchYear(year, btn) {
        currentYear = year;
        currentIdx = 0; // 重置到第一個月
        
        // 切換按鈕樣式
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        await init();
    }

    async function init() {
        try {
            const fileName = `sst_taiwan_${currentYear}_full.json`;
            console.log(`正在載入 ${fileName}...`);
            const response = await fetch(fileName);
            allData = await response.json();
            
            months = [...new Set(allData.map(d => d.t.substring(0, 7)))].filter(m => m).sort();
            
            const dotContainer = document.getElementById('dot-container');
            dotContainer.innerHTML = '';
            months.forEach((m, i) => {
                const dot = document.createElement('span');
                dot.className = `dot ${i === 0 ? 'active' : ''}`;
                dot.onclick = () => jumpToMonth(i);
                dotContainer.appendChild(dot);
            });

            updateUI();
        } catch (err) {
            console.error("初始化失敗:", err);
            document.getElementById('feature-text').innerText = "資料載入失敗，請確認 JSON 檔案是否存在。";
        }
    }

    function updateUI() {
        if (months.length === 0) return;
        const targetMonth = months[currentIdx];
        
        document.getElementById('month-label').innerText = targetMonth;
        document.getElementById('feature-text').innerText = 
            featureDescriptions[targetMonth] || "此月份海溫隨氣候現象發展呈現動態變動，觀察重點在於距平值的正負轉換。";

        document.querySelectorAll('.dot').forEach((d, i) => {
            d.className = i === currentIdx ? 'dot active' : 'dot';
        });

        drawChart(targetMonth);
    }
    
    function drawChart(month) {
        const monthData = allData.filter(d => d.t.startsWith(month) && d.v !== null);
        const lats = [...new Set(monthData.map(d => Number(d.lat)))].sort((a, b) => a - b);
        const lons = [...new Set(monthData.map(d => Number(d.lon)))].sort((a, b) => a - b);

        const zData = lats.map(lat => {
            return lons.map(lon => {
                const points = monthData.filter(d => Number(d.lat) === lat && Number(d.lon) === lon);
                if (points.length === 0) return null;
                const sum = points.reduce((acc, curr) => acc + curr.v, 0);
                return sum / points.length;
            });
        });

        const trace = {
            x: lons, y: lats, z: zData,
            type: 'heatmap',
            colorscale: 'RdBu',
            reversescale: false,
            zmid: 0, zmin: -1.5, zmax: 1.5,
            zsmooth: 'best', connectgaps: false
        };

        const layout = {
            title: { text: `<b>${month} 台灣海域海溫距平 (月平均)</b>`, font: { size: 20 } },
            xaxis: { title: '經度 (E)', dtick: 2, scaleanchor: 'y', scaleratio: 1 },
            yaxis: { title: '緯度 (N)', dtick: 2 },
            margin: { t: 60, b: 50, l: 60, r: 40 },
        };
        Plotly.newPlot('chart', [trace], layout);
    }
    
    function changeMonth(step) {
        currentIdx = (currentIdx + step + months.length) % months.length;
        updateUI();
    }

    function jumpToMonth(i) {
        currentIdx = i;
        updateUI();
    }

    init();

    document.addEventListener('keydown', event => {
        if (event.key === 'ArrowRight' || event.key === ' ') {
            changeMonth(1);
        } else if (event.key === 'ArrowLeft') {
            changeMonth(-1);
        }
    });
</script>

</body>
</html>
