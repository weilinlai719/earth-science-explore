 async function switchYear(year, btn) {

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

function renderDots() {

    dotContainer.innerHTML = '';
    currentYearMonths.forEach((m, i) => {
        const dot = document.createElement('span');
        dot.className = `dot ${i === currentIdx ? 'active' : ''}`;
        dot.onclick = () => jumpToMonth(i);

    });
}
    let monthCache = {};
    async function init() {
        try {
        if (currentYear === '2021') {
            months = ["2021-01", "2021-02", "2021-03", "2021-04", "2021-05", "2021-06",
                      "2021-07", "2021-08", "2021-09", "2021-10", "2021-11", "2021-12"];

            months = ["2023-01", "2023-02", "2023-03", "2023-04", "2023-05", "2023-06",

        }
   const dotContainer = document.getElementById('dot-container');
        dotContainer.innerHTML = '';
        months.forEach((m, i) => {
            const dot = document.createElement('span');
            dot.className = `dot ${i === currentIdx ? 'active' : ''}`;
            dot.onclick = () => jumpToMonth(i);
            dotContainer.appendChild(dot);
        });
        await updateUI();
        preloadData();
        } catch (err) {
            console.error("初始化失敗:", err);
            document.getElementById('feature-text').innerText = "資料載入失敗，請確認 JSON 檔案是否存在。";
        }
    }

    async function preloadData() {
    console.log(`開始預載 ${currentYear} 年份數據...`);
    for (const m of months) {
        if (!monthCache[m]) {
            fetch(`data/${m}.json`)
                .then(res => res.json())
                .then(data => {
                    monthCache[m] = data;
                    console.log(`${m} 預載完成`);
                });
            }
        }
    }

   async function updateUI() {
    if (months.length === 0) return;
    const targetMonth = months[currentIdx]; 
    
    document.getElementById('month-label').innerText = targetMonth;

    try {
        const response = await fetch(`data/${targetMonth}.json`);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const monthData = await response.json(); 

        const activeTab = document.querySelector('.taber-btn.active');
        const mode = activeTab && activeTab.innerText === "AI解說" ? 'AI' : 'feature';
        changecommemtry(mode, activeTab);

        await drawChart(targetMonth, monthData); 

    } catch (err) {
        console.error("抓取月份資料失敗:", err);
        document.getElementById('feature-text').innerText = "找不到該月份資料，請確認 data 資料夾內有 " + targetMonth + ".json";
    }
}

async function drawChart(month, monthData) {

    if (!monthData || monthData.length === 0) {
        console.error("沒有資料可以畫圖:", month);
        return;
    }

    const lats = [...new Set(monthData.map(d => Number(d.lat)))].sort((a, b) => a - b);
    const lons = [...new Set(monthData.map(d => Number(d.lon)))].sort((a, b) => a - b);

    const dataMap = {};
    monthData.forEach(d => {

        if (d.v !== null && typeof d.v === 'number' && !isNaN(d.v)) {
            const key = `${Number(d.lat).toFixed(3)}_${Number(d.lon).toFixed(3)}`;
            if (!dataMap[key]) dataMap[key] = { sum: 0, count: 0 };
            dataMap[key].sum += d.v;
            dataMap[key].count += 1;
        }
    });
  const zData = lats.map(lat => {
        const latStr = lat.toFixed(3);
        return lons.map(lon => {
           const key = `${latStr}_${lon.toFixed(3)}`;
            const record = dataMap[key];
            if (record && record.count > 0 && record.sum !== null) {
                return record.sum / record.count;
            } else {
                return null; 
            }
        });
    });
        const trace = {
            x: lons, y: lats, z: zData,
            type: 'heatmap',
            colorscale: 'RdBu',
            reversescale: false,
            zmid: 0, zmin: -1.5, zmax: 1.5,
            zsmooth: 'best', connectgaps: false,
             colorbar: {
                title: '海溫距平 (°C)',
                titleside: 'top',  
                titlefont: { size: 14, color: '#333',padding: 15, },
                ticks: 'outside',
                tickformat: '.1f',
                len: 1.0,   
                thickness: 30,    
                yanchor: 'middle',
                y: 0.5,
                outlinecolor: '#ddd',  
                outlinewidth: 1
}
        };

        const layout = {
            title: { text: `<b>${month} 台灣海域海溫距平 (月平均)</b>`, font: { size: 20 } },
            xaxis: { title: '經度 (E)', autotick: true,ticks: 'outside',tickformat: '.1f',  scaleanchor: 'y', scaleratio: 1 },
            yaxis: { title: '緯度 (N)', autotick: true,ticks: 'outside',tickformat: '.1f',  scaleratio: 1 },
            margin: { t: 60, b: 50, l: 60, r: 40 },

        };
        Plotly.newPlot('chart', [trace], layout);
    }
   async function changecommemtry(type, btn) {
        document.querySelectorAll('.taber-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
         const targetMonth = months[currentIdx];
        if (type == 'feature') {
            document.getElementById('feature-text').innerText = featureDescriptions[targetMonth] || "此月份海溫隨氣候現象發展呈現動態變動，觀察重點在於距平值的正負轉換。";
        } else if (type == 'AI') {
            document.getElementById('feature-text').innerText =AIfeature[targetMonth] || "根據目前的海溫距平分佈，台灣周邊海域在此月份呈現出明顯的暖化趨勢，這可能與當前的氣候模式和全球暖化趨勢有關。建議持續關注未來幾個月的變化，以評估對台灣氣候的潛在影響。";
        }

    }
    async function changeMonth(step) {
        currentIdx = (currentIdx + step + months.length) % months.length;
        updateUI();
        await sleep(50);
        isProcessing = false;
    }

    function jumpToMonth(i) {
        currentIdx = i;
        updateUI();
    }

    init();
    changecommemtry('feature', document.querySelector('.taber-btn'));
    document.addEventListener('keydown', event => {
        if (isProcessing) return;
        if (event.key === 'ArrowRight' || event.key === ' ') {
            isProcessing = true;
            changeMonth(1);
            
        } else if (event.key === 'ArrowLeft') {
            isProcessing = true;
            changeMonth(-1);
           
        }
    });
</script>
